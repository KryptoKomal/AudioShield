<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepShield Audio</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="glow-orb"></div>
                <h1>DeepShield <span class="accent">Audio</span></h1>
            </div>
            <p class="subtitle">AI Deepfake Detection Engine</p>
        </header>

        <div class="status-panel">
            <div class="status-indicator">
                <span class="dot" id="status-dot"></span>
                <span id="status-text">System Idle</span>
            </div>
        </div>

        <div class="controls">
            <!-- Tab Capture Section -->
            <button id="btn-scan-tab" class="action-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10V5a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5"></path><path d="M22 10l-4-4-4 4"></path><path d="M18 6v16"></path></svg>
                <span id="scan-tab-text">Scan Tab Audio</span>
            </button>

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- File Upload Section -->
            <div class="upload-zone" id="upload-zone">
                <input type="file" id="file-upload" accept=".mp3,.wav,.m4a" hidden>
                <label for="file-upload" class="upload-label">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span>Upload Audio File</span>
                    <small>MP3, WAV, M4A</small>
                </label>
            </div>
        </div>

        <div class="result-container hidden" id="result-container">
            <div class="result-badge" id="result-badge">
                <span id="result-label">Processing...</span>
            </div>
            
            <div class="confidence-section">
                <div class="confidence-header">
                    <span>Confidence Score</span>
                    <span id="confidence-value">--%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </div>
        
        <div class="loading-overlay hidden" id="loading-overlay">
            <div class="spinner"></div>
            <p>Analyzing Audio...</p>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
